name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase database
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gqbsmabwuvutronbszur.supabase.co/rest/v1/profiles?select=count" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Keep-alive query successful"
          else
            echo "Unexpected response: $STATUS — project may be paused"
            exit 1
          fi
